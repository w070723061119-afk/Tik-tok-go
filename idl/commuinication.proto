syntax = "proto3";

package communication;

option go_package = "TikTok/biz/model/communication;communication";

import "api.proto";

service CommunicationService {
  rpc Subscribe(SubscribeRequest) returns (SubscribeResponse) {
    option (api.post) = "/relation/action";
  }
  rpc GetSubscriberList(GetSubscriberListRequest) returns (GetSubscriberListResponse) {
    option (api.get) = "/following/list";
  }
  rpc GetFansList(GetFansListRequest) returns (GetFansListResponse) {
    option (api.get) = "/follower/list";
  }
  rpc GetFriendList(GetFriendListRequest) returns (GetFriendListResponse) {
    option (api.get) = "/friend/list";
  }
}

message SubscribeRequest {
  string user_id = 1[
    (api.form) = "user_id"
  ];
  string target_user_id = 2[
    (api.form) = "to_user_id"
  ];
  int32 action_type = 3[
    (api.form) = "action_type"
  ]; // 1 for subscribe, 0 for unsubscribe
}
message SubscribeResponse {
  baseResponse base_response = 1;
}

message GetSubscriberListRequest {
  string user_id = 1[
    (api.query) = "user_id"
  ];
   int32 page_number = 2[
    (api.query) = "page_number"
  ];
  int32 page_size = 3[
    (api.query) = "page_size"
  ];

}

message GetSubscriberListResponse {
  baseResponse base_response = 1;
  repeated Userinfo subscriber_list = 2;
  int32 subscriber_count = 3;
}

message GetFansListRequest {
  string user_id = 1[
    (api.query) = "user_id"
  ];
   int32 page_number = 2[
    (api.query) = "page_number"
  ];
  int32 page_size = 3[
    (api.query) = "page_size"
  ];
}

message GetFansListResponse {
  baseResponse base_response = 1;
  repeated Userinfo fans_list = 2;
  int32 fans_count = 3;
}
message GetFriendListRequest {
  int32 page_number = 1[
    (api.query) = "page_number"
  ];
  int32 page_size = 2[
    (api.query) = "page_size"
  ];
}
message GetFriendListResponse {
  baseResponse base_response = 1;
  repeated Userinfo friend_list = 2;
  int32 friend_count = 3;
}
message followers{
  
  string create_time = 3[
    (api.go_tag) = 'gorm:"column:create_time"'
  ];
  int32 status = 4[
    (api.go_tag) = 'gorm:"column:status"'
  ];//status =0 那就是关注了,1就是好友状态
  Userinfo following_user = 5[
    (api.go_tag) = 'gorm:"embedded;embeddedPrefix:following_user_"'
  ];
  Userinfo follower_user = 1[
    (api.go_tag) = 'gorm:"embedded;embeddedPrefix:follower_user_"'
  ];

}

message baseResponse {
  int32 status_code = 1;
  string status_msg = 2;
}

message Userinfo{
    string id = 1;
    string name = 2;
    string avatar_url = 3;
}
