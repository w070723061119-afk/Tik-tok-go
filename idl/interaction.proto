syntax = "proto3";

package interaction;

option go_package = "TikTok/biz/model/interaction;interaction";

import "api.proto";
import "video.proto";


service InteractionService {
  rpc LikeVideo(LikeVideoRequest) returns (LikeVideoResponse) {
    option (api.post) = "/like/action";
  }
  rpc GetLikeList(GetLikeListRequest) returns (GetLikeListResponse) {
    option (api.get) = "/like/list";
  }
  rpc CommentVideo(CommentVideoRequest) returns (CommentVideoResponse) {
    option (api.post) = "/comment/pubilsh";
  }
  rpc GetCommentList(GetCommentListRequest) returns (GetCommentListResponse) {
    option (api.get) = "/comment/list";
  }
    rpc DeleteComment(DeleteCommentRequest) returns (DeleteCommentResponse) {
        option (api.post) = "/comment/delete";
    }
  
}

message LikeVideoRequest {
  string video_id = 1;
  int32 action_type = 2; // 1 for like, 0 for unlike
}

message LikeVideoResponse {
  baseResponse base_response = 1;
}
message GetLikeListRequest {
  string user_id = 1;
  int32 page_number = 2;
  int32 page_size = 3;
}

message GetLikeListResponse {
  baseResponse base_response = 1;
  repeated video.Video video_list = 2;
  int32 like_count = 3;
}

message CommentVideoRequest {
  string comment_id = 1;
  string comment_text = 2;
}

message CommentVideoResponse {
  baseResponse base_response = 1;
}
message GetCommentListRequest {
  string video_id = 1;
  int32 page_number = 2;
  int32 page_size = 3;
}
message GetCommentListResponse {
  baseResponse base_response = 1;
  repeated Comment comment_list = 2;
  int32 comment_count = 3;
}
message DeleteCommentRequest {
  string comment_id = 1;
}
message DeleteCommentResponse {
  baseResponse base_response = 1;
}
message baseResponse {
  int32 status_code = 1;
  string status_msg = 2;
}
message Comment {
  string id = 1[
    (api.go_tag) = 'gorm:"primaryKey;autoIncrement" json:"id,omitempty"'
  ];
  string user_id = 2[
    (api.go_tag) = 'gorm:"type:varchar(25)" json:"user_id,omitempty"'
  ];
  string video_id = 3[
    (api.go_tag) = 'gorm:"type:varchar(25)" json:"video_id,omitempty"'
  ];
  string content = 4[
    (api.go_tag) = 'gorm:"type:varchar(255)" json:"content,omitempty"'
  ];
  string created_at = 5[
    (api.go_tag) = 'gorm:"type:varchar(15)" json:"created_at,omitempty"'
  ];
  string updated_at = 6[
    (api.go_tag) = 'gorm:"type:varchar(15)" json:"updated_at,omitempty"'
  ];
  string deleted_at = 7[
    (api.go_tag) = 'gorm:"type:varchar(15)" json:"deleted_at,omitempty"'
  ];
  string parent_comment_id = 8[
    (api.go_tag) = 'gorm:"type:varchar(25)" json:"parent_comment_id,omitempty"'
  ];
  string child_comment_id = 9[
    (api.go_tag) = 'gorm:"type:varchar(25)" json:"child_comment_id,omitempty"'
  ];
  int32 like_count = 10[
    (api.go_tag) = 'gorm:"type:int" json:"like_count,omitempty"'
  ];
}
