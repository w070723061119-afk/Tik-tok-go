syntax = "proto3";

package tiktokgo;

option go_package = "TikTok/userhandler;tiktok";

import "api.proto";

// User service for handling user-related operations
service UserService {
    // User registration
    rpc Register(RegisterRequest) returns (RegisterResponse) {
        option (api.post) = "/user/register";
    }
    
    // User login
    rpc Login(LoginRequest) returns (LoginResponse) {
        option (api.post) = "/user/login";
    }
    
    // Get user information
    rpc GetUserInfo(UserInfoRequest) returns (UserInfoResponse) {
        option (api.get) = "/user/info";
    }

    rpc PostUserPhoto(UserphotoRequest) returns (UserphotoResponse) {
        option (api.post) = "/user/avatar/upload";
    }
}

message RegisterRequest {
    string username = 1;
    string password = 2;
}

message RegisterResponse {
    int32 status_code = 1;
    string status_msg = 2;
    int64 user_id = 3;
    
}

message LoginRequest {
    string username = 1;
    string password = 2;
}

message LoginResponse {
    int32 status_code = 1;
    string status_msg = 2;
    int64 user_id = 3;
    string refresh_token = 4;
    string access_token = 5;
}

message UserInfoRequest {
    int64 user_id = 1;
    string refresh_token = 2;
}

message UserInfoResponse {
    int32 status_code = 1;
    string status_msg = 2;
    Userinfo user = 3;
}

message UserphotoRequest {
    int64 user_id = 1;
    string refresh_token = 2;
    string photo_url = 3;
}
message UserphotoResponse {
    int32 status_code = 1;
    string status_msg = 2;
}

message Userinfo {
    int64 id = 1;
    string username = 2;
    string photo_url = 3;
}
message User {
    int64 id = 1;
    string username = 2;
    string password = 3;
    string photo_url = 4;
    string created_at = 5;
    string updated_at = 6;
    string deleted_at = 7;
}