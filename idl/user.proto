syntax = "proto3";

package user;

option go_package = "TikTok/biz/model/user;user";

import "api.proto";

// User service for handling user-related operations
service UserService {
    // User registration
    rpc Register(RegisterRequest) returns (RegisterResponse) {
        option (api.post) = "/user/register";
    }
    
    // User login
    rpc Login(LoginRequest) returns (LoginResponse) {
        option (api.post) = "/user/login";
    }
    
    // Get user information
    rpc GetUserInfo(UserInfoRequest) returns (UserInfoResponse) {
        option (api.get) = "/user/info";
    }

    rpc PostUserPhoto(UserphotoRequest) returns (UserphotoResponse) {
        option (api.post) = "/user/avatar/upload";
    }
}

message RegisterRequest {
    string username = 1;
    string password = 2;
}

message RegisterResponse {
    baseResponse base = 1;
    string user_id = 3;
    
}

message LoginRequest {
    string username = 1;
    string password = 2;
}

message LoginResponse {
    baseResponse base = 1;
    string user_id = 3;
    string access_token = 5;
}

message UserInfoRequest {
    string user_id = 1;
    
}

message UserInfoResponse {
   baseResponse base = 1;
    Userinfo user = 3;
}

message UserphotoRequest {
    string user_id = 1;
    string refresh_token = 2;
    string photo_url = 3;
}
message UserphotoResponse {
    int32 status_code = 1;
    string status_msg = 2;
}

message Userinfo {
    string id = 1;
    string username = 2;
    string photo_url = 3;
    string created_at = 4;
    string updated_at = 5;
    string deleted_at = 6;
}
message User {
    string id = 1[
        (api.go_tag) = 'gorm:"primaryKey;type:varchar(255)"'
    ];
    string username = 2[
        (api.go_tag) = 'gorm:"unique;type:varchar(255) not null"'
    ];
    string password = 3[
        (api.go_tag) = 'gorm:"type:varchar(255) not null"'
    ];
    string photo_url = 4[
        (api.go_tag) = 'gorm:"type:varchar(255)"'
    ];
    string created_at = 5[
        (api.go_tag) = 'gorm:"type:varchar(25)"'
    ];
    string updated_at = 6[
        (api.go_tag) = 'gorm:"type:varchar(25)"'
    ];
    string deleted_at = 7[
        (api.go_tag) = 'gorm:"type:varchar(25)"'
    ];
}

message baseResponse {
    int32 status_code = 1;
    string status_msg = 2;
}