syntax = "proto3";

package video;

option go_package = "TikTok/biz/model/video;video";

import "api.proto";
service VideoService {
    rpc PublishVideo(PublishVideoRequest) returns (PublishVideoResponse) {
        option (api.post) = "/video/publish";
    }
    
    rpc GetVideoList(GetVideoListRequest) returns (GetVideoListResponse) {
        option (api.get) = "/video/list";
    }
    rpc VideoSearch(VideoSearchRequest) returns (VideoSearchResponse) {
        option (api.get) = "/video/search";
    }
    rpc VideoPopular(VideoPopularRequest) returns (VideoPopularResponse) {
        option (api.get) = "/video/popular";
    }

}




message Video {
    string video_id = 1[
        (api.go_tag) = 'gorm:"primaryKey;type:varchar(25)"'
    ];
    string author_id = 2[
        (api.go_tag) = 'gorm:"type:varchar(25)"'
    ];
    string video_url = 3[
        (api.go_tag) = 'gorm:"type:varchar(255)"'
    ];
    string cover_url = 4[
        (api.go_tag) = 'gorm:"type:varchar(255)"'
    ];
    string title = 5[
        (api.go_tag) = 'gorm:"type:varchar(255)"'
    ];
    string description = 6[
        (api.go_tag) = 'gorm:"type:varchar(255)"'
    ];
    int64 visit_count = 7[
        (api.go_tag) = 'gorm:"type:bigint"'
    ];
    int64 like_count = 8[
        (api.go_tag) = 'gorm:"type:bigint"'
    ];
    int64 comment_count = 9[
        (api.go_tag) = 'gorm:"type:bigint"'
    ];
    string created_at = 10[
        (api.go_tag) = 'gorm:"type:varchar(25)"'
    ];
    string updated_at = 11[
        (api.go_tag) = 'gorm:"type:varchar(25)"'
    ];
    string deleted_at = 12[
        (api.go_tag) = 'gorm:"type:varchar(25)"'
    ];
}

message PublishVideoRequest {
    
    string author_id = 1;
    string title = 4;
    string description = 5;
    string AccessToken = 6[
        (api.header) = "Authorization"
    ];
}

message PublishVideoResponse {
    baseResponse base = 1;
    string video_id = 3;
}

message GetVideoListRequest {
    string user_id = 1[
        (api.query) = "user_id"
    ];
    int32 page_size = 2[
        (api.query) = "page_size"
    ];
    int32 page_num = 3[
        (api.query) = "page_num"
    ];
}

message GetVideoListResponse {
    baseResponse base = 1;
    repeated Video videos = 3;
}

message VideoSearchRequest {
   string keyword = 1
   [
        (api.query) = "keyword"
    ];
    int32 page_size = 3
    [
        (api.form) = "page_size"
    ];
    int32 page_num = 4
    [
        (api.query) = "page_num"
    ];
}
message VideoSearchResponse {
    baseResponse base = 1;
    repeated Video videos = 3;

}
message VideoPopularRequest {
    int32 page_size = 1[
        (api.query) = "page_size"
    ];
    int32 page_num = 2
    [
        (api.query) = "page_num"
    ];
}
message VideoPopularResponse {
    baseResponse base = 1;
    repeated Video videos = 3;
}


message baseResponse {
    int32 status_code = 1;
    string status_msg = 2;
}

